# Hard-copy workspace packages into node_modules instead of symlinking.
# Required for `pnpm deploy` in a Dockerfile, which would otherwise break when workspace deps are symlinks pointing
# back to the monorepo source tree.
injectWorkspacePackages: true

# Refuse to install package versions published less than 3 days ago.
# Mitigates supply-chain attacks via freshly compromised releases.
minimumReleaseAge: 4320

allowBuilds:
  '@parcel/watcher': true
  '@pulumi/kubernetes': true
  dprint: true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

packages:
  - apps/*
  - infra/*
  - libs/*
  - packages/*
  - scripts/*
