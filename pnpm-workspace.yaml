# Hard-copy workspace packages into node_modules instead of symlinking.
# Required for `pnpm deploy` (server Dockerfile) and Next.js standalone output
# (web Dockerfile), which both break when workspace deps are symlinks pointing
# back to the monorepo source tree.
injectWorkspacePackages: true

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@pulumi/kubernetes'
  - esbuild
  - msgpackr-extract
  - protobufjs
  - sharp
  - unrs-resolver

packages:
  - apps/*
  - infra/*
  - libs/*
  - packages/*
  - scripts/*
